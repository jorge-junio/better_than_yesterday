{% extends 'base.html' %}

{% block title %}
SGN - Tarefas recorrentes
{% endblock %}

{% block content %}

<div class="container mt-4">
    <h3 class="display-6">Deletar Tarefa Recorrente</h3>
    <div class="card">
        <div class="card-body">
            <p class="card-text">Tem certeza que deseja excluir a tarefa recorrente <strong>{{ object.name }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger mt-3">Deletar</button>
            </form>

            <a href="{% url 'recurring_task_list' %}" class="btn btn-secondary mt-3">Cancelar e voltar para a lista</a>
        </div>
    </div>
</div>

{% endblock %}
