<div data-page-title="{{ page_title }}">
<div class="container mt-4">
    <h3 class="display-6">Excluir Categoria</h3>
    <div class="card">
        <div class="card-body">
            <p class="mb-0">Tem certeza que deseja excluir a categoria <strong>{{ object.name }}</strong>?</p>
            <form method="post" action="{% url 'category_delete' object.id %}" hx-post="{% url 'category_delete' object.id %}" hx-target="#page-content" hx-swap="innerHTML" class="mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger" title="Excluir categoria">Excluir</button>
                <a href="{{ cancel_url }}" class="btn btn-secondary ms-2" title="Cancelar" hx-get="{{ cancel_url }}" hx-target="#page-content" hx-swap="innerHTML" hx-push-url="true">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
</div>
