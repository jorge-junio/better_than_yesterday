# GITHUB ACTIONS
name: release-producao

on:
  workflow_dispatch:
    inputs:
      versao:
        description: 'Versão da imagem de produção'
        required: true

jobs:
  push:
    # if: "$GITHUB_REF_NAME" == "main"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Build image produção
        run: docker build -t ghcr.io/$GITHUB_REPOSITORY:${{ github.event.inputs.versao }} .


      - name: Log in to registry
        # This is where you will update the personal access token to GITHUB_TOKEN
        run: echo "${{ secrets.DEPLOY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push ghcr.io/$GITHUB_REPOSITORY:${{ github.event.inputs.versao }}
