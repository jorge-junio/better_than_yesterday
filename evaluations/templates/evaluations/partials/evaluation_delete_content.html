<div data-page-title="{{ page_title }}">
<div class="container mt-4">
    <h3 class="display-6">Excluir Avaliação</h3>
    <div class="card border-danger">
        <div class="card-body">
            <p class="mb-0">Tem certeza que deseja excluir a avaliação de <strong>{{ object.tested_at|date:'d/m/Y H:i' }}</strong>?</p>
        </div>
    </div>
    <form method="post" action="{{ request.path }}" hx-post="{{ request.path }}" hx-target="#page-content" hx-swap="innerHTML" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" title="Excluir">Excluir</button>
        <a href="{{ cancel_url }}" class="btn btn-secondary ms-2" title="Cancelar" hx-get="{{ cancel_url }}" hx-target="#page-content" hx-swap="innerHTML" hx-push-url="true">Cancelar</a>
    </form>
</div>
</div>
