<div data-page-title="{{ page_title }}">
<div class="container mt-4">
    <h3 class="display-6">Detalhes da Palavra</h3>
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">{{ object.word }}</h3>
            {% if object.meanings_text %}
            <div class="mb-3">
                <h6 class="text-muted">Significados</h6>
                <ul class="mb-0 ps-3">
                    {% for meaning in object.meanings_text %}
                    <li>{{ meaning }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
            {% if object.note %}
            <div class="mt-3">
                <h6 class="text-muted">Observação</h6>
                <p class="mb-0">{{ object.note }}</p>
            </div>
            {% endif %}
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <a href="{% url 'english_word_list' %}" class="btn btn-secondary" title="Voltar para a lista" hx-get="{% url 'english_word_list' %}" hx-target="#page-content" hx-swap="innerHTML" hx-push-url="true">Voltar para a lista</a>
        <a href="{% url 'english_word_update' object.id %}" class="btn btn-warning" title="Editar" hx-get="{% url 'english_word_update' object.id %}" hx-target="#page-content" hx-swap="innerHTML" hx-push-url="true">Editar</a>
    </div>
</div>
</div>
