<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    #sidebar-column {
      width: 16rem;
      transition: width 180ms ease, padding 180ms ease;
    }

    body.sidebar-collapsed #sidebar-column {
      width: 4.75rem;
    }

    #sidebar-column .sidebar-shell {
      width: 100%;
    }

    body.sidebar-collapsed #sidebar-column .sidebar-shell {
      padding-left: 0.75rem !important;
      padding-right: 0.75rem !important;
    }

    body.sidebar-collapsed #sidebar-column .sidebar-label {
      display: none !important;
    }

    body.sidebar-collapsed #sidebar-column #menu {
      align-items: center !important;
    }

    body.sidebar-collapsed #sidebar-column .nav-link,
    body.sidebar-collapsed #sidebar-column button {
      justify-content: center;
    }

    body.sidebar-collapsed #sidebar-column li {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    body.sidebar-collapsed #sidebar-column .sidebar-shell {
      align-items: center !important;
    }

    #main-column {
      flex: 1 1 auto;
      min-width: 0;
    }
  </style>
  <script>
    function getCookie(name) {
      const cookieValue = document.cookie
        .split('; ')
        .find((row) => row.startsWith(name + '='));

      return cookieValue ? decodeURIComponent(cookieValue.split('=').slice(1).join('=')) : null;
    }

    document.addEventListener('htmx:configRequest', (event) => {
      const csrfToken = getCookie('csrftoken');
      if (csrfToken) {
        event.detail.headers['X-CSRFToken'] = csrfToken;
      }
    });

    window.BTY = window.BTY || {};
    window.BTY.charts = window.BTY.charts || {};

    window.BTY.setPageTitle = function (root) {
      if (!root) {
        return;
      }

      const titleSource = root.dataset && root.dataset.pageTitle
        ? root
        : (root.querySelector ? root.querySelector('[data-page-title]') : null);
      const title = titleSource && titleSource.dataset ? titleSource.dataset.pageTitle : null;
      if (title) {
        document.title = title;
      }
    };

    window.BTY.setLoading = function (visible) {
      const indicator = document.getElementById('htmx-loading');
      if (!indicator) {
        return;
      }
      indicator.classList.toggle('d-none', !visible);
    };

    window.BTY.syncDashboardRefresh = function () {
      const refreshTarget = document.getElementById('dashboard-refresh');
      if (!refreshTarget) {
        return;
      }

      if (window.BTY.dashboardRefreshTimer) {
        window.clearInterval(window.BTY.dashboardRefreshTimer);
        window.BTY.dashboardRefreshTimer = null;
      }

      if (window.location.pathname !== '{% url 'dashboard' %}') {
        return;
      }

      const refreshDashboard = function () {
        if (window.location.pathname !== '{% url 'dashboard' %}') {
          return;
        }

        refreshTarget.setAttribute('hx-get', window.location.pathname + window.location.search);
        htmx.trigger(refreshTarget, 'refresh');
      };

      window.BTY.dashboardRefreshTimer = window.setInterval(refreshDashboard, 60000);
    };

    window.BTY.syncSidebarState = function () {
      const shell = document.getElementById('sidebar-column');
      const toggle = document.getElementById('sidebar-toggle');
      if (!shell || !toggle) {
        return;
      }

      const icon = toggle.querySelector('[data-sidebar-icon]');
      const applyState = function (collapsed) {
        document.body.classList.toggle('sidebar-collapsed', collapsed);
        toggle.setAttribute('aria-expanded', String(!collapsed));
        if (icon) {
          icon.classList.toggle('bi-chevron-double-left', !collapsed);
          icon.classList.toggle('bi-chevron-double-right', collapsed);
        }
        localStorage.setItem('bty-sidebar-collapsed', collapsed ? '1' : '0');
      };

      const stored = localStorage.getItem('bty-sidebar-collapsed');
      applyState(stored === '1');

      toggle.onclick = function () {
        applyState(!document.body.classList.contains('sidebar-collapsed'));
      };
    };

    window.BTY.cleanupModals = function () {
      document.querySelectorAll('.modal.show').forEach((modalEl) => {
        const instance = window.bootstrap && window.bootstrap.Modal
          ? window.bootstrap.Modal.getInstance(modalEl)
          : null;
        if (instance) {
          instance.hide();
        }
      });

      document.querySelectorAll('.modal-backdrop').forEach((backdrop) => backdrop.remove());
      document.body.classList.remove('modal-open');
      document.body.style.removeProperty('padding-right');
      document.body.style.removeProperty('overflow');
    };

    window.BTY.renderDashboardCharts = function (root) {
      if (!root) {
        return;
      }

      const completionElement = root.querySelector('#completion-chart-data');
      const rangeStatusElement = root.querySelector('#range-status-chart-data');
      const weekdayElement = root.querySelector('#weekday-chart-data');
      const todayCanvas = root.querySelector('#todayCompletionChart');
      const rangeCanvas = root.querySelector('#rangeStatusChart');
      const weekdayCanvas = root.querySelector('#weekdayChart');

      if (!completionElement || !rangeStatusElement || !weekdayElement || !todayCanvas || !rangeCanvas || !weekdayCanvas) {
        return;
      }

      const destroyChart = function (key) {
        if (window.BTY.charts[key]) {
          window.BTY.charts[key].destroy();
        }
      };

      destroyChart('today');
      destroyChart('range');
      destroyChart('weekday');

      const todayChartData = JSON.parse(completionElement.textContent);
      const rangeChartData = JSON.parse(rangeStatusElement.textContent);
      const weekdayChartData = JSON.parse(weekdayElement.textContent);

      window.BTY.charts.today = new Chart(todayCanvas, {
        type: 'doughnut',
        data: {
          labels: todayChartData.labels,
          datasets: [{
            data: todayChartData.values,
            backgroundColor: ['rgba(34, 197, 94, 0.9)', 'rgba(239, 68, 68, 0.9)'],
            borderWidth: 0,
          }],
        },
        options: {
          plugins: {
            legend: { position: 'bottom' },
          },
          cutout: '68%',
        },
      });

      window.BTY.charts.range = new Chart(rangeCanvas, {
        type: 'doughnut',
        data: {
          labels: rangeChartData.labels,
          datasets: [{
            data: rangeChartData.values,
            backgroundColor: ['rgba(59, 130, 246, 0.9)', 'rgba(245, 158, 11, 0.9)'],
            borderWidth: 0,
          }],
        },
        options: {
          plugins: {
            legend: { position: 'bottom' },
          },
          cutout: '68%',
        },
      });

      window.BTY.charts.weekday = new Chart(weekdayCanvas, {
        type: 'bar',
        data: {
          labels: weekdayChartData.labels,
          datasets: [{
            label: 'Taxa de conclusão',
            data: weekdayChartData.values,
            backgroundColor: 'rgba(20, 184, 166, 0.85)',
            borderRadius: 8,
          }],
        },
        options: {
          scales: {
            y: {
              beginAtZero: true,
              max: 100,
            }
          },
          plugins: {
            legend: { display: false },
          },
        },
      });
    };

    document.addEventListener('DOMContentLoaded', function () {
      window.BTY.renderDashboardCharts(document);
      window.BTY.setPageTitle(document.querySelector('[data-page-title]'));
      window.BTY.syncDashboardRefresh();
      window.BTY.syncSidebarState();
    });

    document.addEventListener('htmx:beforeRequest', function () {
      window.BTY.setLoading(true);
    });

    document.addEventListener('htmx:afterRequest', function () {
      window.BTY.setLoading(false);
    });

    document.addEventListener('htmx:afterSwap', function (event) {
      window.BTY.cleanupModals();
      window.BTY.renderDashboardCharts(event.detail.target);
      window.BTY.setPageTitle(event.detail.target);
      window.BTY.syncDashboardRefresh();
      window.BTY.syncSidebarState();
    });
  </script>
</head>

<body>
  {% include 'components/_header.html' %}

  <div id="htmx-loading" class="d-none position-fixed top-0 start-0 w-100" style="z-index: 1080;">
    <div class="progress rounded-0" style="height: 3px;">
      <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
    </div>
  </div>

  <div id="dashboard-refresh" class="d-none" hx-target="#page-content" hx-swap="innerHTML" hx-push-url="false" hx-trigger="refresh"></div>

  <div class="d-flex w-100 align-items-stretch">
    {% if user.is_authenticated %}
      {% include 'components/_sidebar.html' %}
    {% endif %}

    <div id="main-column" class="py-3">
      <div class="container-fluid mt-4 px-3 px-lg-4">
        <main id="page-content" {% if user.is_authenticated %}hx-boost="true"{% endif %}>
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </div>
  {% include 'components/_footer.html' %}
</body>

</html>
