.configure_docker:
  image: docker:stable
  services:
  - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  after_script:
    - docker logout $CI_REGISTRY
  tags:
    - docker

release:homolog:
  stage: release
  extends:
    - .configure_docker
  rules:
    - if: '$CI_COMMIT_REF_NAME == "develop"'
      when: manual
  script:
    - docker build
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      -t $CI_REGISTRY_IMAGE:latest
      --target homolog .

    - docker build
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA-worker
      -t $CI_REGISTRY_IMAGE:latest-worker
      --target worker-homolog .

    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA-worker
    - docker push $CI_REGISTRY_IMAGE:latest-worker

release:production:
  stage: release
  extends:
    - .configure_docker
  rules:
  - if: $CI_COMMIT_TAG
    when: always
  script:
    - docker build
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
      -t $CI_REGISTRY_IMAGE:latest
      --target prod .

    - docker build
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-worker
      -t $CI_REGISTRY_IMAGE:latest-worker
      --target worker .

    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-worker
    - docker push $CI_REGISTRY_IMAGE:latest-worker

.configure_ssh:
  before_script:
    - apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    - echo "$SSH_SERVER_HOSTKEYS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

.configure_ssh_local_server:
  before_script:
    - apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_LOCAL_SERVER" | tr -d '\r' | ssh-add -

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    - echo "$SSH_SERVER_HOSTKEYS_LOCAL_SERVER" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

.configure_ssh_prod:
  before_script:
    - apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    - echo "$SSH_SERVER_HOSTKEYS_PROD" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

