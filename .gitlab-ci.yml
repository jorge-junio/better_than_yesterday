image: python:3.7-slim-buster

stages:
  - restoredbfromprod
  - analysis
  # - test
  - release
  - deploy

flake8:
  stage: analysis
  script:
    - pip install flake8
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 . --count --max-complexity=10 --max-line-length=80 --statistics --exclude migrations
  tags:
    - docker

